<!DOCTYPE html>
<html>
<head>
  <title>Smart Meter Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #1c1e21; margin: 0; padding: 20px; text-align: center; }
    h2 { color: #2c3e50; font-weight: 600; margin-bottom: 30px; }
    #connectBtn { background-color: #2980b9; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
    #connectBtn:hover { background-color: #1f6391; }
    .grid-container { display: none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 900px; margin: auto; text-align: center; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .value { font-size: 2.2em; font-weight: bold; color: #2980b9; margin: 10px 0; }
    .label { color: #7f8c8d; text-transform: uppercase; font-size: 0.85em; letter-spacing: 1.5px; font-weight: bold; }
    .bill-card { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    .bill-card .value, .bill-card .label { color: white; }
  </style>
</head>
<body>
  <h2>⚡ Direct USB Dashboard</h2>
  
  <button id="connectBtn">Connect to Meter</button>
  
  <div class="grid-container" id="dashboard">
    <div class="card"><div class="label">Voltage</div><div class="value"><span id="volt">--</span> V</div></div>
    <div class="card"><div class="label">Current</div><div class="value"><span id="curr">--</span> A</div></div>
    <div class="card"><div class="label">Active Power</div><div class="value"><span id="pow">--</span> W</div></div>
    <div class="card"><div class="label">Energy Consumed</div><div class="value"><span id="ener">--</span> kWh</div></div>
    <div class="card bill-card"><div class="label">Estimated Bill</div><div class="value">₹ <span id="bill">--</span></div></div>
  </div>

<script>
    async function connect() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        
        // --- THE FIX: Release the reset pins so the ESP32 can run ---
        await port.setSignals({ dataTerminalReady: false, requestToSend: false });
        // ------------------------------------------------------------
      
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
        
        const decoder = new TextDecoderStream();
        const inputDone = port.readable.pipeTo(decoder.writable);
        const inputStream = decoder.readable;
        const reader = inputStream.getReader();
        
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            reader.releaseLock();
            break;
          }
          buffer += value;
          let lines = buffer.split('\n');
          buffer = lines.pop(); 
          
          for (let line of lines) {
            line = line.trim();

            if (line.startsWith('{') && line.endsWith('}')) {
              try {
                let data = JSON.parse(line);
                document.getElementById("volt").innerText = data.voltage.toFixed(1);
                document.getElementById("curr").innerText = data.current.toFixed(2);
                document.getElementById("pow").innerText = data.power.toFixed(1);
                document.getElementById("ener").innerText = data.energy.toFixed(3);
                document.getElementById("bill").innerText = data.bill.toFixed(2);
              } catch (e) {
                console.error("Data error:", e);
              }
            }
          }
        }
      } catch (error) {
        console.error("Connection failed:", error);
      }
    }

    document.getElementById('connectBtn').addEventListener('click', connect);
  </script>
</body>
</html>
